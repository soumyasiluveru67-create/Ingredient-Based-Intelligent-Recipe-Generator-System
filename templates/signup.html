<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1495195134817-aeb325a55b65") no-repeat center;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
}

input{
padding:10px;
margin:10px;
width:90%;
}

button{
padding:10px 20px;
background:#ff7f50;
color:white;
border:none;
cursor:pointer;
}

a{
text-decoration:none;
color:#ff7f50;
}

</style>

</head>

<body>

<div class="overlay">

<div class="box">

<h2>Create Account</h2>

<form method="post" action="/signup">

<input name="username" placeholder="Username" required>
<br>

<input name="password" type="password" placeholder="Password" required>
<br>

<button>Signup</button>

</form>

<br>

<a href="/login">Login</a>

</div>

</div>

</body>
</html>
